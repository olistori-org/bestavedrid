- name: Bootstrap server
  hosts: web
  become: true

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Get minikube IP
      shell: minikube ip
      become: true
      become_user: github-runner
      register: minikube_ip_output

    - name: Set fact
      set_fact:
        minikube_ip: "{{ minikube_ip_output.stdout }}"

  roles:
    - nginx

  tasks:
    - name: Install basic packages
      apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - lsb-release
        state: present