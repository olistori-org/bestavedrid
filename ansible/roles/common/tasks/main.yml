---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - unzip
      - ca-certificates
      - gnupg
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"
